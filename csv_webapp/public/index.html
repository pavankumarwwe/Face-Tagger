<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face-Tagger | Select Movie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 4rem 2rem 2rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #a855f7, #6366f1, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p.subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-top: 1rem;
            max-width: 600px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }

        .movie-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 2rem;
            text-decoration: none;
            color: var(--text-main);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 160px;
        }

        .movie-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .movie-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .movie-card:hover::before {
            opacity: 1;
        }

        .movie-card h2 {
            margin: 0 0 1rem 0;
            font-size: 1.5rem;
            font-weight: 600;
            z-index: 1;
            text-transform: capitalize;
        }

        .movie-card .action {
            display: inline-flex;
            align-items: center;
            color: var(--accent);
            font-weight: 500;
            font-size: 1rem;
            z-index: 1;
            transition: color 0.2s;
        }

        .movie-card:hover .action {
            color: var(--accent-hover);
        }

        .movie-card .action svg {
            margin-left: 8px;
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .movie-card:hover .action svg {
            transform: translateX(4px);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.25rem;
            padding: 4rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Face-Tagger Portal</h1>
        <p class="subtitle">Select a movie dataset to review and edit actor tags. Fully secured and backed by cloud syncing.</p>
    </header>

    <div class="container">
        <div id="loading" class="loader">Loading secure database...</div>
        <div id="grid" class="grid"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/files')
                .then(res => res.json())
                .then(data => {
                    const grid = document.getElementById('grid');
                    const loading = document.getElementById('loading');
                    
                    if (data.files && data.files.length > 0) {
                        loading.style.display = 'none';
                        grid.innerHTML = data.files.map((file, i) => {
                            const displayName = file.replace('.csv', '').replace('_tagged','').replace(/_/g, ' ');
                            return `
                                <a href="editor.html?file=${encodeURIComponent(file)}" class="movie-card" style="animation-delay: ${Math.min(i * 0.1, 1)}s">
                                    <h2>${displayName}</h2>
                                    <div class="action">
                                        Open Secured Editor
                                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                        </svg>
                                    </div>
                                </a>
                            `;
                        }).join('');
                    } else {
                        loading.textContent = 'No movies available to edit.';
                    }
                })
                .catch(err => {
                    document.getElementById('loading').textContent = 'Error securely connecting to backend.';
                    console.error(err);
                });
        });
    </script>
</body>
</html>
