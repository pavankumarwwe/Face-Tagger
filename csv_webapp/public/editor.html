<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Data Editor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header style="display: flex; flex-direction: column; gap: 1.5rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; min-height: 48px;">
                <div style="flex: 1; display: flex; justify-content: flex-start; align-items: center;">
                    <a href="/" class="btn" title="Please push any changes made to cloud" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">Home</a>
                </div>
                
                <h1 id="page-title" style="margin: 0; flex: 2; text-align: center; display: flex; align-items: center; justify-content: center;">CSV Manager</h1>
                
                <div style="flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 15px;">
                    <div class="status-indicator" style="display: flex; align-items: center; justify-content: center; margin: 0; background: transparent; padding: 0; border: none; box-shadow: none;">
                        <span id="save-status" style="line-height: normal; font-weight: 500; display: flex; align-items: center;">Ready</span>
                        <div id="save-spinner" class="spinner hidden" style="margin-left: 8px;"></div>
                    </div>
                    <button id="push-btn" class="btn" style="background-color: var(--success-color); color: white; margin: 0; display: inline-flex; align-items: center; justify-content: center;">Push to Cloud</button>
                </div>
            </div>

            <div class="file-loader" style="justify-content: center; width: 100%;">
                <select id="file-select"></select>
                <button id="load-file-btn" class="btn">Load</button>
                <a id="open-movie-btn" class="btn" target="_blank" style="display: none; text-decoration: none; margin-left: 10px;">Open Movie</a>
                <span id="open-movie-help" style="margin-left: 10px; color: #ef4444; font-size: 0.9em; display: none;">No youtube link available for this movie</span>
            </div>
        </header>

        <main>
            <div class="table-wrapper">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>Start Time</th>
                            <th>End Time</th>
                            <th>Original Telugu</th>
                            <th>Transliteration</th>
                            <th>Actors</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows will be populated here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
