<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Face-Tagger CSV Data Editor - Tag actors in movie subtitles">
    <meta name="theme-color" content="#4f46e5">
    <title>CSV Data Editor</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="editor-header">
            <div class="editor-header-top">
                <div class="editor-left-group">
                    <a href="/" id="home-link" class="btn btn-secondary editor-home-link editor-compact-btn">Home</a>
                    <button id="mark-complete-btn" class="btn btn-success editor-compact-btn" style="display: none;">Mark as Complete</button>
                    <button id="push-btn" class="btn btn-success editor-compact-btn" style="display: none;">Save to Cloud</button>
                </div>

                <div class="editor-title-block">
                    <h1 id="page-title" class="editor-title">CSV Manager</h1>
                </div>

                <div class="editor-right-group">
                    <span id="save-status" class="editor-save-status">Ready</span>
                    <div id="save-spinner" class="spinner hidden"></div>
                    <button id="clear-all-btn" class="btn btn-danger-outline" style="display: none;">Clear All Tags</button>
                    <a id="ref-btn" href="#" target="_blank" class="btn btn-secondary" style="display: none;">Cast Images</a>
                    <button id="reopen-btn" class="btn btn-warning" style="display: none;">Reopen</button>
                    <button id="export-btn" class="btn btn-secondary" style="display: none;">Export CSV</button>
                </div>
            </div>

            <div class="editor-filebar">
                <div class="file-loader">
                    <select id="file-select"></select>
                    <button id="load-file-btn" class="btn">Load</button>
                    <a id="open-movie-btn" class="btn" href="#" style="display: none; text-decoration: none;">Play Movie</a>
                </div>
                <span id="open-movie-help" class="editor-movie-help" style="display: none;">No youtube link available for this movie</span>
            </div>
        </header>

        <main>
            <div class="table-wrapper">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>Start Time</th>
                            <th>End Time</th>
                            <th>Speaker</th>
                            <th>Actors</th>
                            <th>Movie Dialogue</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows will be populated here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- YouTube Player Modal -->
    <div id="youtube-modal" class="youtube-modal position-top-right" style="display: none;">
        <div class="youtube-modal-content">
            <div class="youtube-modal-header" id="player-header">
                <h3 id="youtube-modal-title">Movie Player</h3>
                <div class="playback-controls">
                    <button id="seek-back-btn" class="control-btn" title="Backward 10s">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
                        </svg>
                    </button>
                    <button id="play-pause-btn" class="control-btn play-pause-toggle" title="Play/Pause">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path id="play-pause-path" d="M8 5v14l11-7z"/>
                        </svg>
                    </button>
                    <button id="seek-fwd-btn" class="control-btn" title="Forward 10s">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 19l7-7-7-7M5 19l7-7-7-7"/>
                        </svg>
                    </button>
                    <button id="mute-btn" class="control-btn" title="Mute/Unmute">
                        <svg id="volume-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        </svg>
                        <svg id="mute-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <line x1="23" y1="9" x2="17" y2="15"/>
                            <line x1="17" y1="9" x2="23" y2="15"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-controls">
                    <button class="modal-close" id="close-youtube-modal" title="Close player">&times;</button>
                </div>
            </div>
            <div class="youtube-modal-body">
                <div class="youtube-player-wrapper">
                    <div id="youtube-player"></div>
                    <div class="video-time-overlay">
                        <span id="video-current-time">0:00</span>
                        <span>/</span>
                        <span id="video-duration">0:00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
