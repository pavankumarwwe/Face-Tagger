<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Face-Tagger CSV Data Editor - Tag actors in movie subtitles">
    <meta name="theme-color" content="#4f46e5">
    <title>CSV Data Editor</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header style="display: flex; flex-direction: column; gap: 0.75rem; align-items: center;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div style="flex: 1; display: flex; align-items: center;">
                    <a href="/" class="btn" style="text-decoration: none;">Home</a>
                </div>

                <h1 id="page-title" style="margin: 0; padding: 0; text-align: center; font-size: 1.5rem;">CSV Manager</h1>

                <div style="flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 10px;">
                    <span id="save-status" style="font-weight: 500; font-size: 0.9rem; color: var(--text-secondary);">Ready</span>
                    <div id="save-spinner" class="spinner hidden"></div>
                    <button id="clear-all-btn" class="btn" style="background-color: #ef4444; color: white;">Clear All Tags</button>
                    <button id="push-btn" class="btn" style="background-color: var(--success-color); color: white;">Push to Cloud</button>
                    <a id="ref-btn" href="#" target="_blank" class="btn btn-secondary" style="display: none;">Cast Images</a>
                </div>
            </div>

            <div style="display: flex; justify-content: center; align-items: center; width: 100%; position: relative;">
                <div class="file-loader" style="display: flex; justify-content: center; align-items: center; gap: 10px;">
                    <select id="file-select" style="height: 38px;"></select>
                    <button id="load-file-btn" class="btn" style="height: 38px;">Load</button>
                    <a id="open-movie-btn" class="btn" href="#" style="display: none; text-decoration: none; height: 38px; align-items: center;">Open Movie</a>
                </div>
                <span id="open-movie-help" style="position: absolute; right: 0; color: #ef4444; font-size: 0.9rem; line-height: 1.2; display: none;">No youtube link available for this movie</span>
            </div>
        </header>

        <main>
            <div class="table-wrapper">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>Start Time</th>
                            <th>End Time</th>
                            <th>Speaker</th>
                            <th>Original Telugu</th>
                            <th>Actors</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows will be populated here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- YouTube Player Modal -->
    <div id="youtube-modal" class="youtube-modal position-top-right" style="display: none;">
        <div class="youtube-modal-content">
            <div class="youtube-modal-header" id="player-header">
                <h3 id="youtube-modal-title">Movie Player</h3>
                <div class="playback-controls">
                    <button id="seek-back-btn" class="control-btn" title="Backward 10s">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
                        </svg>
                    </button>
                    <button id="play-pause-btn" class="control-btn play-pause-toggle" title="Play/Pause">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path id="play-pause-path" d="M8 5v14l11-7z"/>
                        </svg>
                    </button>
                    <button id="seek-fwd-btn" class="control-btn" title="Forward 10s">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 19l7-7-7-7M5 19l7-7-7-7"/>
                        </svg>
                    </button>
                    <button id="mute-btn" class="control-btn" title="Mute/Unmute">
                        <svg id="volume-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        </svg>
                        <svg id="mute-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <line x1="23" y1="9" x2="17" y2="15"/>
                            <line x1="17" y1="9" x2="23" y2="15"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-controls">
                    <button class="modal-close" id="close-youtube-modal" title="Close player">&times;</button>
                </div>
            </div>
            <div class="youtube-modal-body">
                <div class="youtube-player-wrapper">
                    <div id="youtube-player"></div>
                    <div class="video-time-overlay">
                        <span id="video-current-time">0:00</span>
                        <span>/</span>
                        <span id="video-duration">0:00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
